server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # www → bare domain redirect (Cloudflare handles this too, but belt-and-suspenders)
    if ($host = 'www.codereviewtrends.com') {
        return 301 https://codereviewtrends.com$request_uri;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline';" always;

    # Cache static assets aggressively
    # Note: add_header in a location block replaces server-level headers,
    # so security headers must be repeated here.
    location ~* \.(png|ico|svg|xml|txt)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline';" always;
    }

    # Serve static files only — unknown paths return 404 (important for SEO;
    # a catch-all fallback to index.html would create soft-404s).
    location / {
        try_files $uri $uri/ =404;
    }
}
