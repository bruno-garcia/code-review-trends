server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # www → bare domain redirect (Cloudflare handles this too, but belt-and-suspenders)
    if ($host = 'www.codereviewtrends.com') {
        return 301 https://codereviewtrends.com$request_uri;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache static assets aggressively
    location ~* \.(png|ico|svg|xml|txt)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — everything serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
