<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0a0a0f;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    gap: 60px;
  }
  .variant-label {
    color: #555;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: -40px;
  }
  .logo-row {
    display: flex;
    align-items: center;
    gap: 18px;
  }
  .wordmark {
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .wordmark .main {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    line-height: 1.1;
  }
  .wordmark .main .code { color: #e0e0ef; }
  .wordmark .main .review { color: #a78bfa; }
  .wordmark .main .trends { color: #7c5fcf; }
  .wordmark .sub {
    font-size: 11px;
    color: #555;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* Variant 2 - inline */
  .logo-inline .wordmark .main { font-size: 26px; }
  .logo-inline .wordmark .sub { display: none; }

  /* Variant 3 - compact icon only */
  .icon-only { display: flex; align-items: center; gap: 40px; }

  /* Dark card preview */
  .preview-card {
    background: #12121a;
    border: 1px solid #1e1e2e;
    border-radius: 16px;
    padding: 40px 50px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .preview-card.nav {
    width: 700px;
    padding: 16px 28px;
    border-radius: 12px;
    justify-content: space-between;
  }
  .nav-links {
    display: flex;
    gap: 24px;
  }
  .nav-links a {
    color: #666;
    text-decoration: none;
    font-size: 13px;
    letter-spacing: 0.3px;
  }
  .nav-links a:first-child { color: #a78bfa; }
</style>
</head>
<body>

<!-- ===== MAIN LOGO ===== -->
<span class="variant-label">Primary</span>
<div class="preview-card">
  <div class="logo-row">
    <svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="g1" x1="10" y1="0" x2="42" y2="52" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#a78bfa"/>
          <stop offset="100%" stop-color="#6d28d9"/>
        </linearGradient>
        <linearGradient id="g2" x1="26" y1="8" x2="26" y2="44" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#c4b5fd"/>
          <stop offset="100%" stop-color="#8b5cf6"/>
        </linearGradient>
        <filter id="glow">
          <feGaussianBlur stdDeviation="2" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <!-- Diamond background -->
      <rect x="26" y="2" width="33.94" height="33.94" rx="7" transform="rotate(45 26 2)" fill="url(#g1)" opacity="0.15"/>
      <rect x="26" y="4" width="31.11" height="31.11" rx="6" transform="rotate(45 26 4)" fill="none" stroke="url(#g1)" stroke-width="1.2" opacity="0.4"/>
      
      <!-- Branch lines -->
      <g filter="url(#glow)">
        <!-- Main trunk -->
        <line x1="22" y1="14" x2="22" y2="40" stroke="url(#g2)" stroke-width="3" stroke-linecap="round"/>
        <!-- Branch off -->
        <path d="M22 20 C22 20, 24 20, 28 16" stroke="url(#g2)" stroke-width="3" stroke-linecap="round" fill="none"/>
        <!-- Merge back -->
        <path d="M22 32 C22 32, 24 32, 28 28" stroke="url(#g2)" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.5" stroke-dasharray="2 3"/>
      </g>
      
      <!-- Nodes -->
      <circle cx="22" cy="14" r="3.5" fill="#c4b5fd" stroke="#0a0a0f" stroke-width="1.5"/>
      <circle cx="22" cy="40" r="3.5" fill="#7c3aed" stroke="#0a0a0f" stroke-width="1.5"/>
      <circle cx="30" cy="14" r="3" fill="#a78bfa" stroke="#0a0a0f" stroke-width="1.5"/>
      <circle cx="30" cy="26" r="3" fill="#8b5cf6" stroke="#0a0a0f" stroke-width="1.5" opacity="0.6"/>
      
      <!-- Trend arrow -->
      <g opacity="0.9">
        <polyline points="30,36 35,30 38,32 44,24" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <polyline points="40,24 44,24 44,28" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </g>
    </svg>
    <div class="wordmark">
      <div class="main">
        <span class="code">Code</span><span class="review">Review</span><span class="trends">Trends</span>
      </div>
      <div class="sub">Analytics &amp; Insights</div>
    </div>
  </div>
</div>

<!-- ===== NAV BAR PREVIEW ===== -->
<span class="variant-label">In Navigation</span>
<div class="preview-card nav">
  <div class="logo-row logo-inline">
    <svg width="32" height="32" viewBox="0 0 52 52" fill="none">
      <defs>
        <linearGradient id="g1b" x1="10" y1="0" x2="42" y2="52" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#a78bfa"/>
          <stop offset="100%" stop-color="#6d28d9"/>
        </linearGradient>
        <linearGradient id="g2b" x1="26" y1="8" x2="26" y2="44" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#c4b5fd"/>
          <stop offset="100%" stop-color="#8b5cf6"/>
        </linearGradient>
      </defs>
      <rect x="26" y="2" width="33.94" height="33.94" rx="7" transform="rotate(45 26 2)" fill="url(#g1b)" opacity="0.15"/>
      <rect x="26" y="4" width="31.11" height="31.11" rx="6" transform="rotate(45 26 4)" fill="none" stroke="url(#g1b)" stroke-width="1.2" opacity="0.4"/>
      <line x1="22" y1="14" x2="22" y2="40" stroke="url(#g2b)" stroke-width="3" stroke-linecap="round"/>
      <path d="M22 20 C22 20, 24 20, 28 16" stroke="url(#g2b)" stroke-width="3" stroke-linecap="round" fill="none"/>
      <path d="M22 32 C22 32, 24 32, 28 28" stroke="url(#g2b)" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.5" stroke-dasharray="2 3"/>
      <circle cx="22" cy="14" r="3.5" fill="#c4b5fd" stroke="#0a0a0f" stroke-width="1.5"/>
      <circle cx="22" cy="40" r="3.5" fill="#7c3aed" stroke="#0a0a0f" stroke-width="1.5"/>
      <circle cx="30" cy="14" r="3" fill="#a78bfa" stroke="#0a0a0f" stroke-width="1.5"/>
      <circle cx="30" cy="26" r="3" fill="#8b5cf6" stroke="#0a0a0f" stroke-width="1.5" opacity="0.6"/>
      <polyline points="30,36 35,30 38,32 44,24" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9"/>
      <polyline points="40,24 44,24 44,28" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9"/>
    </svg>
    <div class="wordmark">
      <div class="main">
        <span class="code">Code</span><span class="review">Review</span><span class="trends">Trends</span>
      </div>
    </div>
  </div>
  <div class="nav-links">
    <a href="#">Dashboard</a>
    <a href="#">Repos</a>
    <a href="#">Reports</a>
    <a href="#">Settings</a>
  </div>
</div>

<!-- ===== ICON VARIANTS ===== -->
<span class="variant-label">Icon Variants</span>
<div class="preview-card">
  <div class="icon-only">
    <!-- Large -->
    <svg width="64" height="64" viewBox="0 0 52 52" fill="none">
      <defs>
        <linearGradient id="g1c" x1="10" y1="0" x2="42" y2="52" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#6d28d9"/>
        </linearGradient>
        <linearGradient id="g2c" x1="26" y1="8" x2="26" y2="44" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#c4b5fd"/><stop offset="100%" stop-color="#8b5cf6"/>
        </linearGradient>
      </defs>
      <rect x="26" y="2" width="33.94" height="33.94" rx="7" transform="rotate(45 26 2)" fill="url(#g1c)" opacity="0.15"/>
      <rect x="26" y="4" width="31.11" height="31.11" rx="6" transform="rotate(45 26 4)" fill="none" stroke="url(#g1c)" stroke-width="1.2" opacity="0.4"/>
      <line x1="22" y1="14" x2="22" y2="40" stroke="url(#g2c)" stroke-width="3" stroke-linecap="round"/>
      <path d="M22 20 C22 20, 24 20, 28 16" stroke="url(#g2c)" stroke-width="3" stroke-linecap="round" fill="none"/>
      <path d="M22 32 C22 32, 24 32, 28 28" stroke="url(#g2c)" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.5" stroke-dasharray="2 3"/>
      <circle cx="22" cy="14" r="3.5" fill="#c4b5fd" stroke="#0a0a0f" stroke-width="1.5"/>
      <circle cx="22" cy="40" r="3.5" fill="#7c3aed" stroke="#0a0a0f" stroke-width="1.5"/>
      <circle cx="30" cy="14" r="3" fill="#a78bfa" stroke="#0a0a0f" stroke-width="1.5"/>
      <circle cx="30" cy="26" r="3" fill="#8b5cf6" stroke="#0a0a0f" stroke-width="1.5" opacity="0.6"/>
      <polyline points="30,36 35,30 38,32 44,24" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9"/>
      <polyline points="40,24 44,24 44,28" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9"/>
    </svg>
    <!-- Medium -->
    <svg width="40" height="40" viewBox="0 0 52 52" fill="none">
      <rect x="26" y="2" width="33.94" height="33.94" rx="7" transform="rotate(45 26 2)" fill="#7c3aed" opacity="0.2"/>
      <line x1="22" y1="14" x2="22" y2="40" stroke="#a78bfa" stroke-width="3.5" stroke-linecap="round"/>
      <path d="M22 20 C22 20, 24 20, 28 16" stroke="#a78bfa" stroke-width="3.5" stroke-linecap="round" fill="none"/>
      <path d="M22 32 C22 32, 24 32, 28 28" stroke="#a78bfa" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.4" stroke-dasharray="2 3"/>
      <circle cx="22" cy="14" r="4" fill="#c4b5fd" stroke="#0a0a0f" stroke-width="2"/>
      <circle cx="22" cy="40" r="4" fill="#7c3aed" stroke="#0a0a0f" stroke-width="2"/>
      <circle cx="30" cy="14" r="3.5" fill="#a78bfa" stroke="#0a0a0f" stroke-width="2"/>
      <polyline points="30,36 35,30 38,32 44,24" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <polyline points="40,24 44,24 44,28" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>
    <!-- Favicon -->
    <svg width="24" height="24" viewBox="0 0 52 52" fill="none">
      <rect x="26" y="2" width="33.94" height="33.94" rx="7" transform="rotate(45 26 2)" fill="#7c3aed" opacity="0.25"/>
      <line x1="22" y1="14" x2="22" y2="40" stroke="#a78bfa" stroke-width="4.5" stroke-linecap="round"/>
      <path d="M22 20 C23 20, 25 18, 29 15" stroke="#a78bfa" stroke-width="4.5" stroke-linecap="round" fill="none"/>
      <circle cx="22" cy="14" r="5" fill="#c4b5fd"/>
      <circle cx="22" cy="40" r="5" fill="#7c3aed"/>
      <circle cx="30" cy="14" r="4.5" fill="#a78bfa"/>
      <polyline points="31,36 36,29 44,23" stroke="#22d3ee" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>
  </div>
</div>

</body>
</html>
