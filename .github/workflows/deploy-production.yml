name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      sha:
        description: "Commit SHA to deploy (defaults to latest main)"
        required: false
        type: string

# Only one production deploy at a time
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  resolve-sha:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      sha: ${{ steps.sha.outputs.sha }}
    steps:
      - name: Determine deploy SHA
        id: sha
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ -n "${{ inputs.sha }}" ]]; then
            echo "sha=${{ inputs.sha }}" >> $GITHUB_OUTPUT
            echo "Deploying specific SHA: ${{ inputs.sha }}"
          else
            # Default to latest main HEAD
            SHA=$(gh api repos/${{ github.repository }}/git/ref/heads/main --jq '.object.sha')
            if [[ -z "${SHA}" || "${SHA}" == "null" ]]; then
              echo "::error::Failed to resolve latest main SHA"
              exit 1
            fi
            echo "sha=${SHA}" >> $GITHUB_OUTPUT
            echo "Deploying latest main: ${SHA}"
          fi

  deploy:
    needs: resolve-sha
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/deploy.yml
    with:
      environment: production
      sha: ${{ needs.resolve-sha.outputs.sha }}
      build_pipeline: false
    secrets:
      WIF_PROVIDER: ${{ secrets.WIF_PROVIDER_PROD }}
      DEPLOY_SA_EMAIL: ${{ secrets.DEPLOY_SA_EMAIL_PROD }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_DSN_CRT_FRONTEND: ${{ secrets.SENTRY_DSN_CRT_FRONTEND }}
      SENTRY_DSN_CRT_CLI: ${{ secrets.SENTRY_DSN_CRT_CLI }}
