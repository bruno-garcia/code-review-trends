name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck pipeline
        run: npm run typecheck --workspace=pipeline

      - name: Typecheck infra
        run: npm run build --workspace=infra

      - name: Lint infra
        run: npm run lint --workspace=infra

      - name: Test infra
        run: npm run test --workspace=infra

      - name: Build app
        run: npm run build --workspace=app
        env:
          SENTRY_ENVIRONMENT: development
          NEXT_PUBLIC_SENTRY_ENVIRONMENT: development

      - name: Test app (unit)
        run: npm run test --workspace=app

      - name: Build pipeline
        run: npm run build --workspace=pipeline

  test-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:latest
        ports:
          - 8123:8123
          - 9000:9000
        env:
          CLICKHOUSE_DB: code_review_trends
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: dev
        options: >-
          --health-cmd "clickhouse-client --password dev --query 'SELECT 1'"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Init ClickHouse schema and seed data
        run: bash db/init-ci.sh
        env:
          CLICKHOUSE_URL: http://localhost:8123
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: dev

      - name: Validate ClickHouse schema
        run: npm run validate --workspace=pipeline
        env:
          CLICKHOUSE_URL: http://localhost:8123
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: dev
          CLICKHOUSE_DB: code_review_trends

      - name: Run app integration tests
        run: npm run test:integration --workspace=app
        env:
          CLICKHOUSE_URL: http://localhost:8123
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: dev
          CLICKHOUSE_DB: code_review_trends

      - name: Run pipeline tests
        run: npm test --workspace=pipeline
        env:
          CLICKHOUSE_URL: http://localhost:8123
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: dev
          CLICKHOUSE_DB: code_review_trends

  test-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:latest
        ports:
          - 8123:8123
          - 9000:9000
        env:
          CLICKHOUSE_DB: code_review_trends
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: dev
        options: >-
          --health-cmd "clickhouse-client --password dev --query 'SELECT 1'"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      HAS_GCP: ${{ secrets.GCP_BQ_SA_KEY != '' && 'true' || 'false' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
        working-directory: app

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
        working-directory: app

      - name: Init ClickHouse schema and seed data
        run: bash db/init-ci.sh
        env:
          CLICKHOUSE_URL: http://localhost:8123
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: dev

      # Smoke tests need BigQuery read access. Uses a dedicated SA key with
      # minimal permissions (bigquery.jobs.create + bigquery.datasets.get).
      # TODO: Migrate to Workload Identity Federation once PR-level OIDC is set up.
      - uses: google-github-actions/auth@v2
        if: ${{ env.HAS_GCP == 'true' }}
        with:
          credentials_json: ${{ secrets.GCP_BQ_SA_KEY }}

      - name: Mask GCP project from auth
        if: ${{ env.HAS_GCP == 'true' }}
        run: |
          PROJECT=$(gcloud config get-value project 2>/dev/null || true)
          if [[ -n "$PROJECT" ]]; then
            echo "::add-mask::${PROJECT}"
          fi

      - name: Run pipeline integration tests (GitHub API)
        run: npm run test:integration --workspace=pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run pipeline smoke tests
        if: ${{ env.HAS_GCP == 'true' }}
        run: npm run test:smoke --workspace=pipeline
        env:
          CLICKHOUSE_URL: http://localhost:8123
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: dev
          CLICKHOUSE_DB: code_review_trends
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Optimize ClickHouse tables
        run: |
          for table in products bots bot_logins review_activity human_review_activity pr_bot_events repos pull_requests pr_comments pr_bot_reactions reaction_scan_progress; do
            curl -sf "http://localhost:8123/?user=default&password=dev" \
              -d "OPTIMIZE TABLE code_review_trends.${table} FINAL" || true
          done

      - name: Build app
        run: npm run build --workspace=app
        env:
          CLICKHOUSE_URL: http://localhost:8123
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: dev
          CLICKHOUSE_DB: code_review_trends
          SENTRY_ENVIRONMENT: development
          NEXT_PUBLIC_SENTRY_ENVIRONMENT: development

      - name: Run Playwright tests
        run: npm run test:e2e --workspace=app
        env:
          CLICKHOUSE_URL: http://localhost:8123
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: dev
          CLICKHOUSE_DB: code_review_trends
          SENTRY_ENVIRONMENT: development
          NEXT_PUBLIC_SENTRY_ENVIRONMENT: development

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: app/playwright-report/
          retention-days: 14

  deploy-staging:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [lint-and-build, test-pipeline, test-e2e]
    concurrency:
      group: deploy-staging
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/deploy.yml
    with:
      environment: staging
      sha: ${{ github.sha }}
      build_pipeline: true
    secrets:
      WIF_PROVIDER: ${{ secrets.WIF_PROVIDER }}
      DEPLOY_SA_EMAIL: ${{ secrets.DEPLOY_SA_EMAIL }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_DSN_CRT_FRONTEND: ${{ secrets.SENTRY_DSN_CRT_FRONTEND }}
      SENTRY_DSN_CRT_CLI: ${{ secrets.SENTRY_DSN_CRT_CLI }}
