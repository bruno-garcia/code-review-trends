name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck pipeline
        run: npm run typecheck --workspace=pipeline

      - name: Typecheck infra
        run: npm run build --workspace=infra

      - name: Lint infra
        run: npm run lint --workspace=infra

      - name: Test infra
        run: npm run test --workspace=infra

      - name: Build app
        run: npm run build --workspace=app
        env:
          # Build doesn't need ClickHouse — pages are dynamic
          CLICKHOUSE_URL: ""

      - name: Build pipeline
        run: npm run build --workspace=pipeline

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:24.12
        ports:
          - 8123:8123
          - 9000:9000
        env:
          CLICKHOUSE_DB: code_review_trends
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: dev
        options: >-
          --health-cmd "clickhouse-client --password dev --query 'SELECT 1'"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      HAS_GCP: ${{ secrets.GCP_SA_KEY != '' && 'true' || 'false' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: app

      - name: Init ClickHouse schema and seed data
        run: bash db/init-ci.sh
        env:
          CLICKHOUSE_URL: http://localhost:8123
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: dev

      - name: Validate ClickHouse schema
        run: npm run validate --workspace=pipeline
        env:
          CLICKHOUSE_URL: http://localhost:8123
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: dev
          CLICKHOUSE_DB: code_review_trends

      - name: Run pipeline tests
        run: npm test --workspace=pipeline
        env:
          CLICKHOUSE_URL: http://localhost:8123
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: dev
          CLICKHOUSE_DB: code_review_trends

      # TODO: Migrate smoke test auth from SA key to Workload Identity Federation
      - uses: google-github-actions/auth@v2
        if: ${{ env.HAS_GCP == 'true' }}
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Run pipeline smoke tests
        if: ${{ env.HAS_GCP == 'true' }}
        run: npm run test:smoke --workspace=pipeline
        env:
          CLICKHOUSE_URL: http://localhost:8123
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: dev
          CLICKHOUSE_DB: code_review_trends
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Playwright tests
        run: npm run test:e2e --workspace=app
        env:
          CLICKHOUSE_URL: http://localhost:8123
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: dev
          CLICKHOUSE_DB: code_review_trends

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: app/playwright-report/
          retention-days: 14

  deploy-staging:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [lint-and-build, e2e]
    permissions:
      id-token: write
      contents: read
    env:
      REGION: us-central1
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet

      - name: Determine image tags
        id: tags
        run: |
          SHA=$(git rev-parse --short HEAD)
          PROJECT=$(gcloud config get-value project)
          GAR="${REGION}-docker.pkg.dev/${PROJECT}/crt"
          echo "app=${GAR}/app:${SHA}" >> $GITHUB_OUTPUT
          echo "pipeline=${GAR}/pipeline:${SHA}" >> $GITHUB_OUTPUT

      - name: Build and push app image
        run: |
          docker build -f app/Dockerfile \
            --build-arg SENTRY_AUTH_TOKEN="${{ secrets.SENTRY_AUTH_TOKEN }}" \
            --build-arg NEXT_PUBLIC_COMMIT_SHA="${{ github.sha }}" \
            --tag ${{ steps.tags.outputs.app }} \
            .
          docker push ${{ steps.tags.outputs.app }}

      - name: Build and push pipeline image
        run: |
          docker build -f pipeline/Dockerfile \
            --tag ${{ steps.tags.outputs.pipeline }} \
            .
          docker push ${{ steps.tags.outputs.pipeline }}

      - name: Deploy app to Cloud Run
        run: |
          gcloud run deploy crt-staging-app \
            --image=${{ steps.tags.outputs.app }} \
            --region=${REGION} \
            --quiet

          # Ensure the new revision is serving 100% of traffic.
          # gcloud run deploy *should* do this, but if it doesn't (e.g. due
          # to v1/v2 API quirks), this is an explicit safety net.
          gcloud run services update-traffic crt-staging-app \
            --to-latest \
            --region=${REGION} \
            --quiet

          # Verify the correct image is serving.
          # Filter for the traffic entry with latestRevision=true rather than
          # relying on array ordering, which can vary with traffic splits.
          SERVING_REV=$(gcloud run services describe crt-staging-app \
            --region=${REGION} \
            --format=json | jq -r '.status.traffic[] | select(.latestRevision == true) | .revisionName')
          SERVING_IMAGE=$(gcloud run revisions describe "${SERVING_REV}" \
            --region=${REGION} \
            --format='value(spec.containers[0].image)')
          echo "Serving revision: ${SERVING_REV}"
          echo "Serving image:    ${SERVING_IMAGE}"
          if [[ "${SERVING_IMAGE}" == *"cloudrun/container/hello"* ]]; then
            echo "::error::Deploy verification failed — still serving the GCP placeholder image"
            exit 1
          fi

      - name: Update pipeline job images
        run: |
          for job in sync backfill discover enrich discover-bots; do
            gcloud run jobs update "crt-staging-${job}" \
              --image=${{ steps.tags.outputs.pipeline }} \
              --region=${REGION} \
              --quiet
          done
