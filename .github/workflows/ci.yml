name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --workspace=app

      - name: Build
        run: npm run build --workspace=app
        env:
          # Build doesn't need ClickHouse — pages are dynamic
          CLICKHOUSE_URL: ""

  e2e:
    runs-on: ubuntu-latest
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:24.12
        ports:
          - 8123:8123
          - 9000:9000
        env:
          CLICKHOUSE_DB: code_review_trends
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: dev
        options: >-
          --health-cmd "clickhouse-client --password dev --query 'SELECT 1'"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: app

      - name: Init ClickHouse schema and seed data
        run: bash db/init-ci.sh
        env:
          CLICKHOUSE_URL: http://localhost:8123
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: dev

      - name: Run Playwright tests
        run: npm run test:e2e --workspace=app
        env:
          CLICKHOUSE_URL: http://localhost:8123
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: dev
          CLICKHOUSE_DB: code_review_trends

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: app/playwright-report/
          retention-days: 14
