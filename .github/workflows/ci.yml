name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck pipeline
        run: npm run typecheck --workspace=pipeline

      - name: Typecheck infra
        run: npm run build --workspace=infra

      - name: Lint infra
        run: npm run lint --workspace=infra

      - name: Test infra
        run: npm run test --workspace=infra

      - name: Build app
        run: npm run build --workspace=app
        env:
          SENTRY_ENVIRONMENT: development
          NEXT_PUBLIC_SENTRY_ENVIRONMENT: development

      - name: Test app (unit)
        run: npm run test --workspace=app

      - name: Build pipeline
        run: npm run build --workspace=pipeline

  test-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:latest
        ports:
          - 8123:8123
          - 9000:9000
        env:
          CLICKHOUSE_DB: code_review_trends
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: dev
        options: >-
          --health-cmd "clickhouse-client --password dev --query 'SELECT 1'"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Init ClickHouse schema and seed data
        run: bash db/init-ci.sh
        env:
          CLICKHOUSE_URL: http://localhost:8123
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: dev

      - name: Validate ClickHouse schema
        run: npm run validate --workspace=pipeline
        env:
          CLICKHOUSE_URL: http://localhost:8123
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: dev
          CLICKHOUSE_DB: code_review_trends

      - name: Run app integration tests
        run: npm run test:integration --workspace=app
        env:
          CLICKHOUSE_URL: http://localhost:8123
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: dev
          CLICKHOUSE_DB: code_review_trends

      - name: Run pipeline tests
        run: npm test --workspace=pipeline
        env:
          CLICKHOUSE_URL: http://localhost:8123
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: dev
          CLICKHOUSE_DB: code_review_trends

  test-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:latest
        ports:
          - 8123:8123
          - 9000:9000
        env:
          CLICKHOUSE_DB: code_review_trends
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: dev
        options: >-
          --health-cmd "clickhouse-client --password dev --query 'SELECT 1'"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      HAS_GCP: ${{ secrets.GCP_BQ_SA_KEY != '' && 'true' || 'false' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
        working-directory: app

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
        working-directory: app

      - name: Init ClickHouse schema and seed data
        run: bash db/init-ci.sh
        env:
          CLICKHOUSE_URL: http://localhost:8123
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: dev

      # Smoke tests need BigQuery read access. Uses a dedicated SA key with
      # minimal permissions (bigquery.jobs.create + bigquery.datasets.get).
      # TODO: Migrate to Workload Identity Federation once PR-level OIDC is set up.
      - uses: google-github-actions/auth@v2
        if: ${{ env.HAS_GCP == 'true' }}
        with:
          credentials_json: ${{ secrets.GCP_BQ_SA_KEY }}

      - name: Mask GCP project from auth
        if: ${{ env.HAS_GCP == 'true' }}
        run: |
          PROJECT=$(gcloud config get-value project 2>/dev/null || true)
          if [[ -n "$PROJECT" ]]; then
            echo "::add-mask::${PROJECT}"
          fi

      - name: Run pipeline integration tests (GitHub API)
        run: npm run test:integration --workspace=pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run pipeline smoke tests
        if: ${{ env.HAS_GCP == 'true' }}
        run: npm run test:smoke --workspace=pipeline
        env:
          CLICKHOUSE_URL: http://localhost:8123
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: dev
          CLICKHOUSE_DB: code_review_trends
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Optimize ClickHouse tables
        run: |
          for table in products bots bot_logins review_activity human_review_activity pr_bot_events repos pull_requests pr_comments pr_bot_reactions reaction_scan_progress; do
            curl -sf "http://localhost:8123/?user=default&password=dev" \
              -d "OPTIMIZE TABLE code_review_trends.${table} FINAL" || true
          done

      - name: Build app
        run: npm run build --workspace=app
        env:
          CLICKHOUSE_URL: http://localhost:8123
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: dev
          CLICKHOUSE_DB: code_review_trends
          SENTRY_ENVIRONMENT: development
          NEXT_PUBLIC_SENTRY_ENVIRONMENT: development

      - name: Run Playwright tests
        run: npm run test:e2e --workspace=app
        env:
          CLICKHOUSE_URL: http://localhost:8123
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: dev
          CLICKHOUSE_DB: code_review_trends
          SENTRY_ENVIRONMENT: development
          NEXT_PUBLIC_SENTRY_ENVIRONMENT: development

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: app/playwright-report/
          retention-days: 14

  deploy-staging:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [lint-and-build, test-pipeline, test-e2e]
    concurrency:
      group: deploy-staging
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    env:
      REGION: us-central1
      DEPLOY_ENV: staging
      SENTRY_DSN_CRT_CLI: ${{ secrets.SENTRY_DSN_CRT_CLI }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.DEPLOY_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Mask GCP identifiers
        run: |
          echo "::add-mask::$(gcloud config get-value project 2>/dev/null)"
          echo "::add-mask::$(gcloud projects describe $(gcloud config get-value project 2>/dev/null) --format='value(projectNumber)' 2>/dev/null)"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet

      - name: Determine image tags
        id: tags
        run: |
          SHA=$(git rev-parse --short HEAD)
          PROJECT=$(gcloud config get-value project 2>/dev/null)
          GAR="${REGION}-docker.pkg.dev/${PROJECT}/crt"
          echo "::add-mask::${GAR}"
          echo "app=${GAR}/app:${SHA}" >> $GITHUB_OUTPUT
          echo "pipeline=${GAR}/pipeline:${SHA}" >> $GITHUB_OUTPUT

      - name: Build and push images
        run: |
          docker build -f app/Dockerfile \
            --build-arg SENTRY_AUTH_TOKEN="${{ secrets.SENTRY_AUTH_TOKEN }}" \
            --build-arg NEXT_PUBLIC_COMMIT_SHA="${{ github.sha }}" \
            --build-arg SENTRY_DSN_CRT_FRONTEND="${{ secrets.SENTRY_DSN_CRT_FRONTEND }}" \
            --build-arg NEXT_PUBLIC_SENTRY_ENVIRONMENT="${DEPLOY_ENV}" \
            --tag ${{ steps.tags.outputs.app }} \
            . &
          APP_PID=$!
          docker build -f pipeline/Dockerfile \
            --build-arg GIT_SHA="${{ github.sha }}" \
            --tag ${{ steps.tags.outputs.pipeline }} \
            . &
          PIPE_PID=$!
          wait $APP_PID || exit 1
          wait $PIPE_PID || exit 1
          docker push ${{ steps.tags.outputs.app }} &
          PUSH_APP=$!
          docker push ${{ steps.tags.outputs.pipeline }} &
          PUSH_PIPE=$!
          wait $PUSH_APP || exit 1
          wait $PUSH_PIPE || exit 1

      - name: Create Sentry release for pipeline
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: bruno-garcia
          SENTRY_PROJECT: code-review-trends-worker
        run: |
          npx @sentry/cli releases new "${{ github.sha }}"
          npx @sentry/cli releases set-commits "${{ github.sha }}" --auto
          npx @sentry/cli releases finalize "${{ github.sha }}"

      - name: Deploy app to Cloud Run (no traffic)
        run: |
          # Deploy the new revision without routing traffic to it yet.
          # We'll warm the cache first, then switch traffic.
          # Suppress stdout to avoid leaking Cloud Run URLs/revision names.
          gcloud run deploy crt-staging-app \
            --image=${{ steps.tags.outputs.app }} \
            --region=${REGION} \
            --no-traffic \
            --tag=warmup \
            --quiet > /dev/null

      - name: Warm up cache on new revision
        run: |
          WARMUP_URL=$(gcloud run services describe crt-staging-app \
            --region=${REGION} \
            --format=json | jq -r '.status.traffic[] | select(.tag == "warmup") | .url')

          if [[ -z "${WARMUP_URL}" || "${WARMUP_URL}" == "null" ]]; then
            echo "::error::Could not determine warmup URL from tagged revision"
            exit 1
          fi

          # Mask the Cloud Run URL so it doesn't appear in logs
          echo "::add-mask::${WARMUP_URL}"

          # Run the instrumented warmup script — creates Sentry spans + metrics per page.
          # Non-zero exit means some pages failed; we warn but don't block the deploy.
          NODE_ENV=staging \
          npm run warmup --workspace=pipeline -- "${WARMUP_URL}" || {
            echo "::warning::Some pages failed to warm up — proceeding with traffic switch anyway"
          }

      - name: Switch traffic to new revision
        run: |
          gcloud run services update-traffic crt-staging-app \
            --to-latest \
            --remove-tags=warmup \
            --region=${REGION} \
            --quiet > /dev/null

          # Verify the correct image is serving
          SERVING_IMAGE=$(gcloud run services describe crt-staging-app \
            --region=${REGION} \
            --format=json | jq -r '
              .status.traffic[]
              | select(.latestRevision == true)
              | .revisionName' | xargs -I{} gcloud run revisions describe {} \
                --region=${REGION} \
                --format='value(spec.containers[0].image)')
          if [[ -z "${SERVING_IMAGE}" ]]; then
            echo "::error::Deploy verification failed — could not determine serving image"
            exit 1
          fi
          if [[ "${SERVING_IMAGE}" == *"cloudrun/container/hello"* ]]; then
            echo "::error::Deploy verification failed — still serving the GCP placeholder image"
            exit 1
          fi
          echo "Deploy verified — serving correct image"

      - name: Update pipeline job images
        run: |
          for job in sync backfill discover enrich enrich-catchup discover-bots; do
            gcloud run jobs update "crt-staging-${job}" \
              --image=${{ steps.tags.outputs.pipeline }} \
              --region=${REGION} \
              --quiet > /dev/null
          done
