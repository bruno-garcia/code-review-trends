name: Sync Pipeline

on:
  schedule:
    # Every Monday at 6:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      command:
        description: "Pipeline command to run"
        required: true
        default: "sync"
        type: choice
        options:
          - sync
          - "sync --weeks 4"
          - "backfill --start 2023-01-01"
          - status
          - "status --json"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Run pipeline
        run: npm run pipeline -- ${{ inputs.command || 'sync' }}
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          CLICKHOUSE_URL: ${{ secrets.CLICKHOUSE_URL }}
          CLICKHOUSE_USER: ${{ secrets.CLICKHOUSE_USER }}
          CLICKHOUSE_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD }}
          CLICKHOUSE_DB: code_review_trends

      - name: Check status
        if: ${{ !contains(inputs.command || 'sync', 'status') }}
        run: npm run pipeline -- status
        env:
          CLICKHOUSE_URL: ${{ secrets.CLICKHOUSE_URL }}
          CLICKHOUSE_USER: ${{ secrets.CLICKHOUSE_USER }}
          CLICKHOUSE_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD }}
          CLICKHOUSE_DB: code_review_trends
