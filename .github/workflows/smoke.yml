name: Smoke Tests

on:
  schedule:
    - cron: '0 8 * * 1' # Every Monday 8am UTC
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:24.12
        ports:
          - 8123:8123
        env:
          CLICKHOUSE_DB: code_review_trends
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: dev
        options: >-
          --health-cmd "clickhouse-client --password dev --query 'SELECT 1'"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Init ClickHouse schema
        run: bash db/init-ci.sh
        env:
          CLICKHOUSE_URL: http://localhost:8123
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: dev

      - name: Run smoke tests (BigQuery + GitHub API → ClickHouse)
        run: npm run test:smoke --workspace=pipeline
        env:
          CLICKHOUSE_URL: http://localhost:8123
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: dev
          CLICKHOUSE_DB: code_review_trends
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
