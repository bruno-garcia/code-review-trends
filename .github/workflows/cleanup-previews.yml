name: Cleanup Preview Aliases

on:
  schedule:
    - cron: "0 3 * * *" # daily at 3am UTC
  workflow_dispatch: # allow manual trigger

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Remove stale preview aliases
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: |
          # Ensure all remote-tracking branches are available
          git fetch --all --prune --quiet

          # Collect all remote branch names, sanitized the same way as preview-alias.yml
          BRANCHES=$(git branch -r --format='%(refname:short)' | sed 's|origin/||')
          SANITIZED_BRANCHES=""
          for BRANCH in $BRANCHES; do
            SLUG=$(echo "$BRANCH" \
              | tr '[:upper:]' '[:lower:]' \
              | sed 's/[^a-z0-9-]/-/g' \
              | sed 's/--*/-/g' \
              | sed 's/^-\|-$//g')
            SANITIZED_BRANCHES="$SANITIZED_BRANCHES $SLUG"
          done

          # List all preview aliases — fail visibly on auth/permission errors
          ALIASES_OUTPUT=$(npx --yes vercel alias ls \
            --token="$VERCEL_TOKEN" \
            --scope="$VERCEL_ORG_ID")
          VERCEL_EXIT=$?

          if [ $VERCEL_EXIT -ne 0 ]; then
            echo "Error: failed to list Vercel aliases (exit code $VERCEL_EXIT)" >&2
            echo "$ALIASES_OUTPUT" >&2
            exit $VERCEL_EXIT
          fi

          ALIASES=$(echo "$ALIASES_OUTPUT" \
            | grep '\.preview\.codereviewtrends\.com' \
            | awk '{print $1}')

          if [ -z "$ALIASES" ]; then
            echo "No preview aliases found, nothing to clean up"
            exit 0
          fi

          for ALIAS in $ALIASES; do
            SLUG=$(echo "$ALIAS" | sed 's/\.preview\.codereviewtrends\.com//')

            if echo "$SANITIZED_BRANCHES" | grep -qw "$SLUG"; then
              echo "✅ Keeping: $ALIAS (branch exists)"
            else
              echo "🗑  Removing: $ALIAS (branch deleted)"
              npx --yes vercel alias rm "$ALIAS" --yes \
                --token="$VERCEL_TOKEN" \
                --scope="$VERCEL_ORG_ID"
            fi
          done
